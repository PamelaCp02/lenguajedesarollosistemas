<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderStreet</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    
    <header class="header">
        <div class="logo">
            <img src="img/logo.jpeg" alt="UnderStreet">
        </div>

        <div class="search">
            <span class="icon">🔍</span>
            <input type="text" placeholder="Buscar...">
        </div>

        <div class="buttons">
            <button class="login">Inicia Sesión</button>
            <button class="register">Regístrate</button>
            <span class="user">👤</span>
        </div>
    </header>

    
    <nav class="nav">
        <span class="home">🏠</span>
        <a href="progreso.html">Acerca de</a>
        <a href="catalogo.html">catalogo</a>
        <a href="asesoria.html">Asesoría</a>
        <a href="contacto.html">Contacto</a>
        <a href="carrito.html">Carrito</a>
    </nav>

    
    <main class="container">

       
        <div class="left">
            <img src="img/img1.jpeg" class="card c1">
            <img src="img/img2.jpeg" class="card c2">
            <img src="img/img3.jpeg" class="card c3">

            <p class="slogan">"Actitud que se viste"</p>
        </div>

        
        <div class="hero">
            <img src="img/img4.jpeg" alt="Hero">
            <div class="overlay-text">
                ESTILO URBANO QUE <br> DEFINE TU IDENTIDAD
            </div>
            <div class="badge">¡Novedades!</div>
        </div>

    </main>

</body>
</html>
