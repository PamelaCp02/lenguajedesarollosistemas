<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderStreet - Asesoría</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ===== HEADER ===== -->
 
<header class="header">

    <div class="logo">
        <img src="logo1.png" alt="logo1">
    </div>

    <div class="search">
        <i class="fa fa-search"></i>
        <input type="text">
    </div>

    <div class="actions">
       <a href="login.html" class="login">Inicia Sesión</a>
            <a href="registro.html" class="register">Regístrate</a>
        <i class="fa fa-user user"></i>
    </div>

</header>

<!-- ===== NAV ===== -->
<nav class="nav">

    <div class="menu">
        <button class="home"><i class="fa fa-house"></i></button>
        <button>Acerca de</button>
        <button>Catálogo</button>
        <button>Asesoría</button>
        <button>Carrito</button>
    </div>

    <div class="social">
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-whatsapp"></i>
        <i class="fa-brands fa-facebook"></i>
    </div>

</nav>

<!-- ===== CONTENIDO PRINCIPAL ===== -->
<main class="main">

    <!-- LADO IZQUIERDO -->
    <section class="left">

        <h1>
            SOLICITAR UNA <br>
            ASESORIA
        </h1>

        <p>
            Completa el formulario y uno de nuestros especialistas se pondrá en contacto 
            para diseñar una propuesta a tu medida
        </p>

    </section>

    <!-- LADO DERECHO -->
    <section class="right">

        <h3>Usuario:</h3>

        <form id="formulario">

            <div class="row">
                <div class="campo">
                    <label>Nombres:</label>
                    <input type="text" required>
                </div>

                <div class="campo">
                    <label>Apellidos:</label>
                    <input type="text" required>
                </div>
            </div>

            <div class="campo">
                <label>Correo electrónico:</label>
                <input type="email" required>
            </div>

            <div class="campo">
                <label>Mensaje:</label>
                <textarea required></textarea>
            </div>

            <button type="submit" class="enviar">Enviar</button>

        </form>

    </section>

</main>
<script src="script.js"></script>

<!-- ===== FOOTER ===== -->
<footer class="footer">

</html>
