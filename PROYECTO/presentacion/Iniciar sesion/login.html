        <button onclick="loginConFacebook()">Iniciar sesión con Facebook</button>
    
        <script>
            // Inicializar el SDK de Facebook
            window.fbAsyncInit = function () {
                FB.init({
                    appId: 'TU_APP_ID_DE_FACEBOOK',
                    cookie: true,  // Habilita las cookies para que el servidor acceda a la sesión
                    xfbml: true,  // Analiza los plugins sociales en esta página
                    version: 'v18.0' // Usa la versión más reciente de la API
                });
            };

            // Cargar el SDK de forma asíncrona
            (function (d, s, id) {
                var js, fjs = d.getElementsByTagName(s)[0];
                if (d.getElementById(id)) return;
                js = d.createElement(s); js.id = id;
                js.src = "https://connect.facebook.net/es_LA/sdk.js";
                fjs.parentNode.insertBefore(js, fjs);
            }(document, 'script', 'facebook-jssdk'));

            // Función para disparar el login
            function loginConFacebook() {
                FB.login(function (response) {
                    if (response.authResponse) {
                        console.log('¡Inicio de sesión exitoso!');
                        // Obtener datos del usuario
                        FB.api('/me', { fields: 'name,email' }, function (userData) {
                            console.log('Nombre: ' + userData.name);
                            console.log('Email: ' + userData.email);
                            alert("Bienvenido, " + userData.name);
                        });
                    } else {
                        console.log('El usuario canceló el inicio de sesión o no lo autorizó.');
                    }
                }, { scope: 'public_profile,email' }); // Permisos que solicitas
            }
        </script>
